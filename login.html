<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS • Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Exo+2:wght@500;600;700&display=swap');
       
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0a0f1c 0%, #02040a 70%);
            min-height: 100vh;
            color: white;
        }
        .title-font { font-family: 'Exo 2', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .glass-left {
            background: linear-gradient(165deg, rgba(16, 25, 45, 0.95), rgba(5, 15, 35, 0.9));
            border-right: 1px solid rgba(148, 163, 184, 0.15);
        }
        .uf {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(148, 163, 184, 0.4);
            padding: 12px 4px;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }
        .uf:focus {
            outline: none;
            border-bottom-color: #4ade80;
        }
        .uf::placeholder {
            color: rgba(163, 163, 163, 0.6);
        }
        .btn-primary {
            background: linear-gradient(to right, #10b981, #14b8a6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(16 185 129 / 0.4);
        }
        .checkbox-custom {
            width: 20px; height: 20px;
            border: 2px solid #64748b;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-custom.checked {
            background: #4ade80;
            border-color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="glass rounded-3xl overflow-hidden w-full max-w-4xl grid md:grid-cols-2 shadow-2xl">
            <!-- Left Panel -->
            <div class="glass-left p-12 md:p-16 flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-3 mb-10">
                        <i class="fa-solid fa-bolt text-emerald-400 text-4xl"></i>
                        <h1 class="title-font text-5xl font-bold tracking-[-2px] bg-gradient-to-r from-emerald-300 via-cyan-200 to-white bg-clip-text text-transparent">NEXUS</h1>
                    </div>
                    <h2 class="text-4xl font-semibold leading-tight mb-4">Welcome back,<br>Explorer.</h2>
                    <p class="text-emerald-400/70 text-lg">Sign in to access your intelligent control system.</p>
                </div>
                <div class="space-y-6 mt-12">
                    <div class="flex items-center gap-4 text-emerald-400/80">
                        <i class="fa-solid fa-microchip text-xl"></i>
                        <span class="text-sm">Real-time device synchronization</span>
                    </div>
                    <div class="flex items-center gap-4 text-emerald-400/80">
                        <i class="fa-solid fa-shield-halved text-xl"></i>
                        <span class="text-sm">Secure Firebase authentication</span>
                    </div>
                    <div class="flex items-center gap-4 text-emerald-400/80">
                        <i class="fa-solid fa-network-wired text-xl"></i>
                        <span class="text-sm">ESP32 multi-device control</span>
                    </div>
                </div>
            </div>

            <!-- Right: Login Form -->
            <div class="p-12 md:p-16 flex flex-col justify-center">
                <div id="authMsg" class="hidden mb-6 px-5 py-4 rounded-2xl text-sm"></div>
                <div class="space-y-8">
                    <div id="usernameWrap" class="hidden">
                        <label class="text-xs uppercase tracking-widest text-zinc-400 mb-2 block">Username</label>
                        <input id="username" type="text" placeholder="Username" class="uf">
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-widest text-zinc-400 mb-2 block">Email Address</label>
                        <input id="email" type="email" placeholder="Email" class="uf">
                    </div>
                    <div class="relative">
                        <label class="text-xs uppercase tracking-widest text-zinc-400 mb-2 block">Password</label>
                        <input id="password" type="password" placeholder="Password" class="uf pr-12">
                        <button onclick="togglePw()" class="absolute right-4 top-10 text-zinc-400 hover:text-white">
                            <i id="pwEyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <div id="confirmWrap" class="hidden">
                        <label class="text-xs uppercase tracking-widest text-zinc-400 mb-2 block">Confirm Password</label>
                        <input id="confirmPassword" type="password" placeholder="••••••••" class="uf">
                    </div>
                    <div id="signinExtras" class="flex justify-between items-center text-sm">
                        <label onclick="toggleRemember()" class="flex items-center gap-3 cursor-pointer select-none">
                            <span id="rememberBox" class="checkbox-custom">
                                <i id="rememberCheck" class="fa-solid fa-check text-xs hidden"></i>
                            </span>
                            <span class="text-zinc-400">Keep me signed in</span>
                        </label>
                        <button onclick="handleForgotPassword()" class="text-emerald-400 hover:text-emerald-300">Forgot password?</button>
                    </div>
                    <button id="submitBtn" onclick="handleSubmit()"
                            class="btn-primary w-full py-6 rounded-3xl font-semibold text-lg tracking-wide flex items-center justify-center gap-3">
                        <span id="submitLabel">SIGN IN</span>
                    </button>
                    <p class="text-center text-zinc-400 text-sm">
                        <span id="switchPrompt">Don't have an account?</span>
                        <button onclick="switchTab(window.currentMode === 'signin' ? 'signup' : 'signin')"
                                id="switchAction" class="text-emerald-400 hover:underline font-medium">Sign up</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendPasswordResetEmail,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtpaYow0i1rPZyvVPJj9nBsj36GgA5c68",
            authDomain: "esp32-iot-e7363.firebaseapp.com",
            databaseURL: "https://esp32-iot-e7363-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "esp32-iot-e7363",
            storageBucket: "esp32-iot-e7363.firebasestorage.app",
            messagingSenderId: "374399284490",
            appId: "1:374399284490:web:1083398487db54421cf6f3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentMode = 'signin';
        let rememberMe = true;
        window.currentMode = currentMode;

        window.switchTab = (target) => {
            currentMode = target;
            window.currentMode = target;

            const usernameWrap = document.getElementById('usernameWrap');
            const confirmWrap = document.getElementById('confirmWrap');
            const signinExtras = document.getElementById('signinExtras');
            const submitLabel = document.getElementById('submitLabel');
            const switchPrompt = document.getElementById('switchPrompt');
            const switchAction = document.getElementById('switchAction');

            if (target === 'signin') {
                usernameWrap.classList.add('hidden');
                confirmWrap.classList.add('hidden');
                signinExtras.classList.remove('hidden');
                submitLabel.textContent = 'SIGN IN';
                switchPrompt.textContent = "Don't have an account?";
                switchAction.textContent = 'Sign up';
            } else {
                usernameWrap.classList.remove('hidden');
                confirmWrap.classList.remove('hidden');
                signinExtras.classList.add('hidden');
                submitLabel.textContent = 'SIGN UP';
                switchPrompt.textContent = 'Already have an account?';
                switchAction.textContent = 'Sign in';
            }
            hideMsg();
        };

        window.togglePw = () => {
            const pwField = document.getElementById('password');
            const icon = document.getElementById('pwEyeIcon');
            const isPw = pwField.type === 'password';
            pwField.type = isPw ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        window.toggleRemember = () => {
            rememberMe = !rememberMe;
            const box = document.getElementById('rememberBox');
            const check = document.getElementById('rememberCheck');
            box.classList.toggle('checked', rememberMe);
            check.classList.toggle('hidden', !rememberMe);
        };

        function showMsg(text, type = 'error') {
            const el = document.getElementById('authMsg');
            el.textContent = text;
            el.className = `mb-6 px-5 py-4 rounded-2xl text-sm font-medium ${
                type === 'error' ? 'bg-red-500/10 border border-red-500/30 text-red-400' : 'bg-emerald-500/10 border border-emerald-500/30 text-emerald-400'
            }`;
            el.classList.remove('hidden');
        }

        function hideMsg() {
            document.getElementById('authMsg').classList.add('hidden');
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = isLoading;
            btn.innerHTML = isLoading 
                ? `<span class="flex items-center justify-center"><i class="fa-solid fa-spinner fa-spin mr-3"></i>PLEASE WAIT...</span>`
                : `<span id="submitLabel">${currentMode === 'signin' ? 'SIGN IN' : 'SIGN UP'}</span>`;
        }

        window.handleSubmit = async () => {
            hideMsg();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value.trim();

            if (!email || !password) {
                showMsg('Please enter both email and password.');
                return;
            }

            if (currentMode === 'signup') {
                if (!username) {
                    showMsg('Please choose a username.');
                    return;
                }
                const confirm = document.getElementById('confirmPassword').value;
                if (password !== confirm) {
                    showMsg('Passwords do not match.');
                    return;
                }
            }

            setLoading(true);
            try {
                await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
                
                if (currentMode === 'signin') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: username });
                }
                window.location.href = "index.html";
            } catch (err) {
                setLoading(false);
                showMsg(err.message || 'Something went wrong.');
            }
        };

        window.handleForgotPassword = async () => {
            hideMsg();
            const email = document.getElementById('email').value.trim();
            if (!email) return showMsg('Please enter your email first.');
            try {
                await sendPasswordResetEmail(auth, email);
                showMsg('Password reset email sent.', 'success');
            } catch (err) {
                showMsg(err.message);
            }
        };

        window.onload = () => toggleRemember();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>

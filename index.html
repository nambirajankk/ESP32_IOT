<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS • IoT Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Exo+2:wght@500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0a0f1c 0%, #02040a 70%);
            min-height: 100vh;
        }
        .title-font { font-family: 'Exo 2', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .device-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .device-card:hover {
            transform: translateY(-8px);
        }

        .toggle-track {
            transition: all 0.4s ease;
        }
        .track-on {
            background-color: #4ade80 !important;
        }
        .toggle-knob {
            transition: all 0.4s ease;
        }
        .knob-on {
            background-color: white !important;
            box-shadow: 0 0 25px white, 0 0 40px rgba(252, 253, 252, 0.7);
        }
    </style>
</head>
<body class="text-white pb-12">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12 sticky top-0 bg-[#02040a]/90 backdrop-blur-md py-5 z-20 border-b border-white/10">
            <div>
                <h1 class="title-font text-6xl font-bold tracking-[-3px] bg-gradient-to-r from-emerald-300 via-cyan-200 to-white bg-clip-text text-transparent">NEXUS</h1>
                <p class="text-emerald-400/70 text-sm tracking-[4px] font-medium">INTELLIGENT CONTROL SYSTEM</p>
            </div>
            <div class="flex gap-4 items-center">
                <span id="userWelcome" onclick="editUsername()" class="text-zinc-300 text-sm mr-2 font-medium cursor-pointer hover:text-emerald-400 transition-colors" title="Click to edit your username"></span>
                <button onclick="showAddModal()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 px-8 py-4 rounded-3xl flex items-center gap-3 font-semibold text-lg shadow-xl shadow-emerald-500/30 transition-all active:scale-95">
                    <i class="fa-solid fa-plus"></i> ADD DEVICE
                </button>
                <button onclick="showWifiModal()" class="bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 px-8 py-4 rounded-3xl flex items-center gap-3 font-semibold text-lg shadow-xl shadow-amber-500/30 transition-all active:scale-95">
                    <i class="fa-solid fa-wifi"></i> WiFi Settings
                </button>
                <button onclick="handleLogout()" class="bg-zinc-800 hover:bg-red-600 px-6 py-4 rounded-3xl flex items-center gap-3 font-semibold text-lg transition-all active:scale-95">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <div id="devicesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- Add Device Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-10 w-full max-w-md mx-4">
            <h2 class="text-3xl font-bold mb-8">Add New Device</h2>
            <input id="deviceName" type="text" placeholder="Device Name" class="w-full bg-zinc-900/80 border border-white/10 rounded-3xl px-6 py-6 mb-6 text-lg focus:outline-none focus:border-emerald-500">
            
            <select id="deviceType" class="w-full bg-zinc-900/80 border border-white/10 rounded-3xl px-6 py-6 mb-6 text-lg focus:outline-none focus:border-emerald-500">
                <option value="led">LED / Light</option>
                <option value="fan">Fan</option>
                <option value="other">Other Device</option>
            </select>

            <select id="gpioPin" class="w-full bg-zinc-900/80 border border-white/10 rounded-3xl px-6 py-6 mb-8 text-lg focus:outline-none focus:border-emerald-500">
                <option value="2">GPIO 2</option>
                <option value="4">GPIO 4</option>
                <option value="5">GPIO 5</option>
                <option value="12">GPIO 12</option>
                <option value="13">GPIO 13</option>
                <option value="14">GPIO 14</option>
                <option value="15">GPIO 15</option>
                <option value="16">GPIO 16</option>
                <option value="17">GPIO 17</option>
                <option value="18">GPIO 18</option>
                <option value="19">GPIO 19</option>
                <option value="21">GPIO 21</option>
                <option value="22">GPIO 22</option>
                <option value="23">GPIO 23</option>
                <option value="25">GPIO 25</option>
                <option value="26">GPIO 26</option>
                <option value="27">GPIO 27</option>
            </select>

            <div class="flex gap-4">
                <button onclick="hideAddModal()" class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-medium text-lg">Cancel</button>
                <button onclick="addNewDevice()" class="flex-1 py-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-semibold text-lg">Add Device</button>
            </div>
        </div>
    </div>

    <div id="wifiModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-10 w-full max-w-md mx-4">
            <h2 class="text-3xl font-bold mb-8">WiFi Configuration</h2>
            <input id="wifiSSID" type="text" placeholder="WiFi SSID (Network Name)" class="w-full bg-zinc-900/80 border border-white/10 rounded-3xl px-6 py-6 mb-6 text-lg">
            <div class="relative mb-8">
                <input id="wifiPassword" type="password" placeholder="WiFi Password" 
                class="w-full bg-zinc-900/80 border border-white/10 rounded-3xl px-6 py-6 pr-12 text-lg">
                <button type="button" onclick="togglePassword()" 
                class="absolute right-6 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white">
            <i id="eyeIcon" class="fa-solid fa-eye"></i>
            </button>
        </div>
            <div class="flex gap-4">
                <button onclick="hideWifiModal()" class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-medium text-lg">Cancel</button>
                <button onclick="saveWifiConfig()" class="flex-1 py-6 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold text-lg">Save & Connect</button>
            </div>
            <p class="text-center text-sm text-zinc-500 mt-6">ESP32 will restart and connect to new network</p>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, push } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtpaYow0i1rPZyvVPJj9nBsj36GgA5c68",
            authDomain: "esp32-iot-e7363.firebaseapp.com",
            databaseURL: "https://esp32-iot-e7363-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "esp32-iot-e7363",
            storageBucket: "esp32-iot-e7363.firebasestorage.app",
            messagingSenderId: "374399284490",
            appId: "1:374399284490:web:1083398487db54421cf6f3"
        };


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const devicesRef = ref(db, "devices");

        const devicesList = document.getElementById('devicesList');

       
        let unsubscribeDevices = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            const displayName = user.displayName || user.email.split('@')[0];
            document.getElementById('userWelcome').textContent = `Welcome back, ${displayName}`;

            window.editUsername = () => {
                const current = auth.currentUser.displayName || '';
                const newName = prompt("Enter your username:", current);
                if (newName !== null && newName.trim()) {
                    updateProfile(auth.currentUser, { displayName: newName.trim() }).then(() => {
                        document.getElementById('userWelcome').textContent = `Welcome back, ${newName.trim()}`;
                    });
                }
            };
            if (!unsubscribeDevices) {
                unsubscribeDevices = onValue(devicesRef, updateDevices);
            }
        });

        window.handleLogout = () => {
            if (unsubscribeDevices) {
                unsubscribeDevices();
                unsubscribeDevices = null;
            }
            signOut(auth);
        };

        function createDeviceCard(key, data) {
            const isOn = data?.status === 1;
            const voltage = data?.voltage ?? 100;
            let icon = 'fa-lightbulb';
            if (data?.type === 'fan') icon = 'fa-fan';
            else if (data?.type === 'other') icon = 'fa-bolt';

            return `
                <div class="device-card glass rounded-3xl p-7">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-5">
                            <i class="fa-solid ${icon} text-5xl ${isOn ? 'text-[#2CFF05]' : 'text-slate-400'}"></i>
                            <div>
                                <div class="font-semibold text-2xl">${data?.name || 'Unnamed Device'}</div>
                                <div class="text-emerald-400/70 text-sm tracking-wider">${data?.type?.toUpperCase() || 'DEVICE'}</div>
                                <div class="text-[10px] text-zinc-400 mt-1">GPIO ${data?.pin ?? 'N/A'}</div>
                            </div>
                        </div>
                        <button onclick="deleteDevice('${key}')" class="text-red-400 hover:text-red-500 text-2xl p-3">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>

                    <!-- Power Toggle -->
                    <div onclick="toggleDevice('${key}', ${isOn ? 1 : 0})" 
                         class="cursor-pointer mb-8 bg-zinc-950 hover:bg-zinc-900 rounded-3xl p-6 flex items-center justify-between text-xl font-semibold">
                        <span class="${isOn ? 'text-[#2CFF05]' : 'text-zinc-500'}">
                            ${isOn ? '🟢 POWER ON' : '⚪ POWER OFF'}
                        </span>
                        <div class="toggle-track w-14 h-8 bg-zinc-700 rounded-full relative ${isOn ? 'track-on' : ''}">
                            <div class="toggle-knob absolute top-1 w-6 h-6 bg-white rounded-full shadow-lg transition-all 
                                 ${isOn ? 'right-1 knob-on' : 'left-1 bg-zinc-400'}"></div>
                        </div>
                    </div>

                    <!-- Voltage Control -->
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-zinc-400 text-sm tracking-wider">INTENSITY</span>
                            <span onclick="editVoltage('${key}', this)" id="volt-${key}" 
                                  class="font-mono text-xl font-semibold text-emerald-400 cursor-pointer hover:text-emerald-300">
                                ${voltage}%
                            </span>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="adjustVoltage('${key}', -5)" class="w-11 h-11 bg-zinc-800 hover:bg-red-600 rounded-2xl text-2xl font-bold">-</button>
                            <input type="range" id="slider-${key}" min="0" max="100" value="${voltage}" step="1" class="flex-1 accent-[#2CFF05] cursor-pointer">
                            <button onclick="adjustVoltage('${key}', 5)" class="w-11 h-11 bg-zinc-800 hover:bg-[#305CDE] rounded-2xl text-2xl font-bold">+</button>
                        </div>
                    </div>
                </div>`;
        }

        function updateDevices(snapshot) {
            devicesList.innerHTML = "";
            const devices = snapshot.val() || {};

            if (Object.keys(devices).length === 0) {
                devicesList.innerHTML = `<div class="text-center py-32 text-zinc-500 col-span-full">No devices yet.<br>Click ADD DEVICE</div>`;
                return;
            }

            Object.entries(devices).forEach(([key, data]) => {
                devicesList.innerHTML += createDeviceCard(key, data);
                setTimeout(() => attachSliderListener(key), 50);
            });
        }

        function attachSliderListener(key) {
            const slider = document.getElementById(`slider-${key}`);
            if (slider) slider.addEventListener('input', () => updateVoltage(key, slider.value));
        }

        window.updateVoltage = (key, value) => {
            set(ref(db, `devices/${key}/voltage`), parseInt(value));
            const voltEl = document.getElementById(`volt-${key}`);
            if (voltEl) voltEl.textContent = value + "%";
        };

        window.adjustVoltage = (key, change) => {
            const el = document.getElementById(`volt-${key}`);
            let current = parseInt(el.textContent);
            if (isNaN(current)) {
                current = 100;
            }
            let newVal = Math.max(0, Math.min(100, current + change));
            updateVoltage(key, newVal);
            const slider = document.getElementById(`slider-${key}`);
            if (slider) slider.value = newVal;
        };

        window.editVoltage = (key, el) => {
            let current = parseInt(el.textContent);
            if(isNaN(current)){
                current = 100;
            }
            const newVal = prompt("Enter intensity (0-100):", current);
            if (newVal !== null) {
                let value = parseInt(newVal);
                if (!isNaN(value)) {
                    value = Math.max(0, Math.min(100, value));
                    updateVoltage(key, value);
                    const slider = document.getElementById(`slider-${key}`);
                    if (slider) slider.value = value;
                }
            }
        };

        window.toggleDevice = (key, current) => set(ref(db, `devices/${key}/status`), current === 1 ? 0 : 1);
        
        window.addNewDevice = () => {
            const name = document.getElementById('deviceName').value.trim();
            if (!name) return alert("Please enter device name");
            
            const newRef = push(devicesRef);
            set(newRef, {
                name: name,
                type: document.getElementById('deviceType').value,
                pin: parseInt(document.getElementById('gpioPin').value),
                status: 0,
                voltage: 100
            }).then(() => {
                hideAddModal();
                document.getElementById('deviceName').value = '';
            });
        };

        let passwordVisible = false;

        window.togglePassword = () => {
            const passwordField = document.getElementById('wifiPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            passwordVisible = !passwordVisible;
            if (passwordVisible) {
                passwordField.type = "text";
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            }
            else{
                passwordField.type = "password";
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        };
        window.showWifiModal = () => document.getElementById('wifiModal').classList.remove('hidden');
        window.hideWifiModal = () => document.getElementById('wifiModal').classList.add('hidden');

        window.saveWifiConfig = () => {
            const ssid = document.getElementById('wifiSSID').value.trim();
            const pass = document.getElementById('wifiPassword').value.trim();
            
            if (!ssid) return alert("Please enter WiFi SSID");

            const wifiRef = ref(db, "wifiConfig");
            set(wifiRef, {
                ssid: ssid,
                password: pass,
                updatedAt: Date.now()
            }).then(() => {
                alert("✅ WiFi settings saved! ESP32 will restart and connect to new network.");
                hideWifiModal();
            }).catch(err => alert("Error saving WiFi config"));
        };

        window.deleteDevice = (key) => { if(confirm("Delete this device?")) remove(ref(db, `devices/${key}`)); };
        window.showAddModal = () => document.getElementById('addModal').classList.remove('hidden');
        window.hideAddModal = () => document.getElementById('addModal').classList.add('hidden');
    </script>
</body>
</html>
